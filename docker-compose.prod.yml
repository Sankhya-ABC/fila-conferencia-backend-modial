services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod

    container_name: fila-conf-backend

    restart: unless-stopped

    ports:
      - "3001:3000"

    env_file:
      - .env

    command: sh -c "npx prisma migrate deploy && node dist/main"

    depends_on:
      - db

  db:
    image: postgres:15

    container_name: fila-conf-db

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: