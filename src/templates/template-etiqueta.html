<!doctype html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Arial Narrow', Arial, sans-serif; font-weight: bold; }

@page { size: 15cm 10cm; margin: 0; }

/* Wrapper físico: 15cm × 10cm */
.page-outer {
  width: 15cm;
  height: 10cm;
  overflow: hidden;
  page-break-after: always;
}

/* Conteúdo no espaço JRXML (425×283pt @ 72dpi)
   Scale para preencher 15cm (566.9px @ 96dpi): 566.9/425 ≈ 1.334 */
.page {
  position: relative;
  width: 425px;
  height: 283px;
  transform: scale(1.334);
  transform-origin: 0 0;
}

.f { position: absolute; font-size: 22px; }
.bottom { display: flex; align-items: flex-end; }
.center { display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.2; }
.right-bottom { display: flex; align-items: flex-end; justify-content: flex-end; }

.box {
  position: absolute;
  border: 1px solid #000;
  border-radius: 10px;
}

.digit {
  position: absolute;
  border: 1px solid #000;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}

.sep { position: absolute; background: #000; }

img { position: absolute; object-fit: contain; padding-left: 5px; }
</style>
</head>
<body>
{{#each volumes}}
<div class="page-outer">
<div class="page">

  <!-- Data/hora de impressão: canto superior direito -->
  <div style="position:absolute;right:3px;top:3px;font-size:8px;font-weight:normal;white-space:nowrap;">{{printDateTime}}</div>

  <!-- Cliente: x=15 y=16 w=395 h=30 -->
  <div class="f bottom" style="left:15px;top:16px;width:395px;height:30px;font-size:15px;overflow:hidden;white-space:nowrap;">Cliente: {{cliente}}</div>

  <!-- Nro. Pedido: x=15 y=46 w=283 h=30 -->
  <div class="f bottom" style="left:15px;top:46px;width:283px;height:30px;">Nro. Pedido: {{numTalao}}</div>

  <!-- UF: x=298 y=46 w=112 h=30 -->
  <div class="f right-bottom" style="left:298px;top:46px;width:112px;height:30px;">UF: {{uf}}</div>

  <!-- "Nota Fiscal:": x=15 y=90 w=75 h=75 -->
  <div class="f center" style="left:15px;top:90px;width:75px;height:75px;">Nota<br>Fiscal:</div>

  <!-- 5 caixas NF vazias -->
  <div class="box" style="left:121px;top:90px;width:54px;height:75px;"></div>
  <div class="box" style="left:180px;top:90px;width:54px;height:75px;"></div>
  <div class="box" style="left:239px;top:90px;width:54px;height:75px;"></div>
  <div class="box" style="left:298px;top:90px;width:54px;height:75px;"></div>
  <div class="box" style="left:356px;top:90px;width:54px;height:75px;"></div>

  <!-- Logo: x=15 y=185 w=75 h=75 -->
  <img src="{{logoBase64}}" alt="Logo" style="left:15px;top:185px;width:75px;height:75px;">

  <!-- REP_DIG1: x=150 y=180 -->
  <div class="digit" style="left:150px;top:180px;width:54px;height:75px;">{{seqVolDig1}}</div>

  <!-- REP_DIG2: x=209 y=180 -->
  <div class="digit" style="left:209px;top:180px;width:54px;height:75px;">{{seqVolDig2}}</div>

  <!-- Separador preto: x=268 y=208 w=25 h=10 -->
  <div class="sep" style="left:268px;top:208px;width:25px;height:10px;"></div>

  <!-- QTD_DIG1: x=298 y=180 -->
  <div class="digit" style="left:298px;top:180px;width:54px;height:75px;">{{totalVolDig1}}</div>

  <!-- QTD_DIG2: x=356 y=180 -->
  <div class="digit" style="left:356px;top:180px;width:54px;height:75px;">{{totalVolDig2}}</div>

</div>
</div>
{{/each}}
</body>
</html>
