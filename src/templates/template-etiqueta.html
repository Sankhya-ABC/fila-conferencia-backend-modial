<!doctype html>
<html>
  <head>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Arial Narrow', Arial, sans-serif;
        font-size: 20px;
        font-weight: bold;
      }

      @page {
        size: 425px 283px;
        margin: 0;
      }

      .page {
        width: 425px;
        height: 283px;
        padding: 14px 10px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        page-break-after: always;
        overflow: hidden;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .label-nf {
        margin-bottom: 6px;
      }

      .numeros-container {
        display: flex;
        gap: 3px;
        align-items: center;
        font-size: 26px;
      }

      .numero {
        width: 44px;
        height: 64px;
        border: 1px solid #000;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo {
        height: 64px;
      }
    </style>
  </head>
  <body>
    {{#each volumes}}
    <div class="page">

      <p>Cliente: {{cliente}}</p>

      <div class="row">
        <p>Nro. Pedido: {{numeroUnico}}</p>
        <p>UF: {{uf}}</p>
      </div>

      {{#if notaFiscal}}
      <div class="row label-nf">
        <p>Nota Fiscal:</p>
        <div class="numeros-container">
          {{#each notaFiscalDigitos}}
          <div class="numero">{{this}}</div>
          {{/each}}
        </div>
      </div>
      {{/if}}

      <div class="row">
        <img class="logo" src="{{logoBase64}}" alt="Logo" />
        <div class="numeros-container">
          {{#each seqVolDigitos}}
          <div class="numero">{{this}}</div>
          {{/each}}
          <span>-</span>
          {{#each totalVolDigitos}}
          <div class="numero">{{this}}</div>
          {{/each}}
        </div>
      </div>

    </div>
    {{/each}}
  </body>
</html>
